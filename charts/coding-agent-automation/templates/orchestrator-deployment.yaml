apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "coding-agent-automation.fullname" . }}-orchestrator
  labels:
    {{- include "coding-agent-automation.labels" . | nindent 4 }}
    app.kubernetes.io/component: orchestrator
  {{- with .Values.orchestrator.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.orchestrator.replicas }}
  strategy:
    type: {{ .Values.orchestrator.strategy.type }}
    {{- if eq .Values.orchestrator.strategy.type "RollingUpdate" }}
    rollingUpdate:
      maxUnavailable: {{ .Values.orchestrator.strategy.rollingUpdate.maxUnavailable }}
      maxSurge: {{ .Values.orchestrator.strategy.rollingUpdate.maxSurge }}
    {{- end }}
  selector:
    matchLabels:
      {{- include "coding-agent-automation.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: orchestrator
  template:
    metadata:
      labels:
        {{- include "coding-agent-automation.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: orchestrator
    spec:
      serviceAccountName: {{ include "coding-agent-automation.serviceAccountName" . }}
      {{- if and .Values.database.enabled (eq .Values.workDistribution.mode "Kubernetes") }}
      automountServiceAccountToken: true
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.orchestrator.terminationGracePeriodSeconds }}
      {{- with .Values.orchestrator.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.orchestrator.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.orchestrator.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.orchestrator.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.orchestrator.initContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: orchestrator
          image: "{{ .Values.orchestrator.image.repository }}:{{ .Values.orchestrator.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.orchestrator.service.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: {{ .Values.orchestrator.probes.liveness.path }}
              port: {{ .Values.orchestrator.probes.liveness.port }}
            initialDelaySeconds: {{ .Values.orchestrator.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.orchestrator.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.orchestrator.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.orchestrator.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.orchestrator.probes.readiness.path }}
              port: {{ .Values.orchestrator.probes.readiness.port }}
            initialDelaySeconds: {{ .Values.orchestrator.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.orchestrator.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.orchestrator.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.orchestrator.probes.readiness.failureThreshold }}
          resources:
            {{- toYaml .Values.orchestrator.resources | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "coding-agent-automation.fullname" . }}-orchestrator-env
          env:
            - name: AGENT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "coding-agent-automation.secretName" . }}
                  key: agent-api-key
            - name: OTEL_EXPORTER_OTLP_HEADERS
              valueFrom:
                secretKeyRef:
                  name: {{ include "coding-agent-automation.secretName" . }}
                  key: otel-headers
                  optional: true
            {{- if .Values.database.enabled }}
            - name: Database__Host
              value: {{ required "database.host is required when database.enabled=true" .Values.database.host | quote }}
            - name: Database__Port
              value: {{ .Values.database.port | default 5432 | quote }}
            - name: Database__Name
              valueFrom:
                secretKeyRef:
                  name: {{ required "database.auth.existingSecret is required when database.enabled=true" .Values.database.auth.existingSecret }}
                  key: {{ .Values.database.auth.keys.database | default "POSTGRES_DB" }}
            - name: Database__Username
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.auth.existingSecret }}
                  key: {{ .Values.database.auth.keys.username | default "POSTGRES_USER" }}
            - name: Database__Password
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.auth.existingSecret }}
                  key: {{ .Values.database.auth.keys.password | default "POSTGRES_PASSWORD" }}
            {{- if .Values.database.sslMode }}
            - name: Database__SslMode
              value: {{ .Values.database.sslMode | quote }}
            {{- end }}
            - name: Database__MigrateOnStartup
              value: {{ .Values.database.migrateOnStartup | quote }}
            - name: WorkDistribution__Mode
              value: {{ .Values.workDistribution.mode | quote }}
            {{- end }}
            {{- if .Values.signalr.redis.connectionString }}
            - name: SignalR__Redis__ConnectionString
              value: {{ .Values.signalr.redis.connectionString | quote }}
            {{- end }}
          volumeMounts:
            {{- if ne .Values.orchestrator.persistence.mountMode "disabled" }}
            - name: pipeline-config
              mountPath: /app/config/pipeline
              {{- if eq .Values.orchestrator.persistence.mountMode "readOnly" }}
              readOnly: true
              {{- end }}
            {{- end }}
      volumes:
        {{- if ne .Values.orchestrator.persistence.mountMode "disabled" }}
        - name: pipeline-config
          {{- if eq .Values.orchestrator.persistence.type "pvc" }}
          persistentVolumeClaim:
            claimName: {{ include "coding-agent-automation.fullname" . }}-orchestrator-config
            {{- if eq .Values.orchestrator.persistence.mountMode "readOnly" }}
            readOnly: true
            {{- end }}
          {{- else if eq .Values.orchestrator.persistence.type "hostPath" }}
          hostPath:
            path: {{ .Values.orchestrator.persistence.hostPath }}
            type: DirectoryOrCreate
          {{- else }}
          emptyDir:
            sizeLimit: 1Gi
          {{- end }}
        {{- end }}
