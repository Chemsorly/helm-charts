{{- if .Values.database.enabled }}
{{- if and (not .Values.database.auth.existingSecret) (not .Values.database.connectionString) }}
{{- fail "database.enabled is true but neither database.connectionString nor database.auth.existingSecret is provided. Set one of these to configure the database connection." }}
{{- end }}
{{- if and (not .Values.database.auth.existingSecret) .Values.database.connectionString }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "coding-agent-automation.fullname" . }}-db
  labels:
    {{- include "coding-agent-automation.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
type: Opaque
stringData:
  connection-string: {{ .Values.database.connectionString | quote }}
{{- end }}
{{- end }}
