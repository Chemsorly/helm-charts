{{- if and .Values.database.enabled .Values.database.migrationJob.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "coding-agent-automation.fullname" . }}-db-migrate
  labels:
    {{- include "coding-agent-automation.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        {{- include "coding-agent-automation.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migration
    spec:
      serviceAccountName: {{ include "coding-agent-automation.serviceAccountName" . }}
      restartPolicy: Never
      {{- with .Values.orchestrator.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.orchestrator.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.orchestrator.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: migrate
          image: "{{ .Values.orchestrator.image.repository }}:{{ .Values.orchestrator.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["dotnet", "CodingAgentWebUI.dll", "migrate"]
          env:
            - name: Database__ConnectionString
              {{- if .Values.database.auth.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.auth.existingSecret }}
                  key: connection-string
              {{- else if .Values.database.connectionString }}
              value: {{ .Values.database.connectionString | quote }}
              {{- else }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "coding-agent-automation.fullname" . }}-db
                  key: connection-string
              {{- end }}
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
{{- end }}
