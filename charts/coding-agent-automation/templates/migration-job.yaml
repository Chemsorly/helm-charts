{{- if and .Values.database.enabled .Values.database.migrationJob.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "coding-agent-automation.fullname" . }}-db-migrate
  labels:
    {{- include "coding-agent-automation.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        {{- include "coding-agent-automation.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migration
    spec:
      serviceAccountName: {{ include "coding-agent-automation.serviceAccountName" . }}
      restartPolicy: Never
      {{- with .Values.orchestrator.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.orchestrator.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.orchestrator.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: migrate
          image: "{{ .Values.orchestrator.image.repository }}:{{ .Values.orchestrator.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["dotnet", "CodingAgentWebUI.dll", "migrate"]
          env:
            - name: Database__Host
              value: {{ required "database.host is required when database.enabled=true" .Values.database.host | quote }}
            - name: Database__Port
              value: {{ .Values.database.port | default 5432 | quote }}
            - name: Database__Name
              valueFrom:
                secretKeyRef:
                  name: {{ required "database.auth.existingSecret is required when database.enabled=true" .Values.database.auth.existingSecret }}
                  key: {{ .Values.database.auth.keys.database | default "POSTGRES_DB" }}
            - name: Database__Username
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.auth.existingSecret }}
                  key: {{ .Values.database.auth.keys.username | default "POSTGRES_USER" }}
            - name: Database__Password
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.auth.existingSecret }}
                  key: {{ .Values.database.auth.keys.password | default "POSTGRES_PASSWORD" }}
            {{- if .Values.database.sslMode }}
            - name: Database__SslMode
              value: {{ .Values.database.sslMode | quote }}
            {{- end }}
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
{{- end }}
