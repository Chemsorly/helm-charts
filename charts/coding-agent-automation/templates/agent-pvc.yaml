{{- if not (and $.Values.database.enabled (eq $.Values.workDistribution.mode "Kubernetes")) }}
{{- range .Values.agents }}
{{- if and .enabled (eq .persistence.type "pvc") (eq .providerType "kiro") }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "coding-agent-automation.agentFullname" (dict "agentName" .name "root" $) }}-data
  labels:
    {{- include "coding-agent-automation.labels" $ | nindent 4 }}
    app.kubernetes.io/component: agent
    app.kubernetes.io/agent-name: {{ .name }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .persistence.pvc.storageClassName }}
  storageClassName: {{ .persistence.pvc.storageClassName | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .persistence.pvc.size }}
{{- end }}
{{- end }}
{{- end }}
