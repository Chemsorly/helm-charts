{{- if not .Values.existingSecret }}
{{- $apiKey := required "secrets.agentApiKey is required when existingSecret is not set. Provide --set secrets.agentApiKey=YOUR_KEY or set existingSecret to reference a pre-existing Secret." .Values.secrets.agentApiKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "coding-agent-automation.fullname" . }}
  labels:
    {{- include "coding-agent-automation.labels" . | nindent 4 }}
type: Opaque
stringData:
  agent-api-key: {{ $apiKey | quote }}
  otel-headers: {{ .Values.secrets.otelHeaders | quote }}
  opencode-config-content: {{ .Values.secrets.opencodeConfigContent | quote }}
{{- end }}
