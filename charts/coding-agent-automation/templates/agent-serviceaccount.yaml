{{- if and .Values.database.enabled (eq .Values.workDistribution.mode "Kubernetes") }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "coding-agent-automation.fullname" . }}-agent
  labels:
    {{- include "coding-agent-automation.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
# Zero RBAC — agent pods have no cluster permissions.
# They communicate exclusively with the orchestrator via HTTP API.
automountServiceAccountToken: false
{{- end }}
